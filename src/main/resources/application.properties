# ============================================================
#  Employee Management — Application Configuration
# ============================================================

# --- DataSource ---
spring.datasource.url=jdbc:mysql://localhost:3306/emp_mgmt_db
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP connection pool (Spring Boot default)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000

# --- JPA / Hibernate ---
# 'update'  : Hibernate auto-updates schema on startup (safe for dev)
# 'validate': Only validates — use in staging/prod
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- SQL Initialization ---
# Set to 'never' to disable auto SQL initialization
# Use manual execution instead via command line
spring.sql.init.mode=never

# --- JSP View Resolver ---
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# --- Server ---
server.port=8080
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.servlet.encoding.force-request=true
server.servlet.encoding.force-response=true

# Spring MVC encoding
spring.mvc.locale=en_IN
spring.web.locale=en_IN

# --- Logging ---
logging.level.com.example.empmanagement=DEBUG
logging.level.org.hibernate.SQL=DEBUG
