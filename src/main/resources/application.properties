# ============================================================
#  Employee Management — Application Configuration
# ============================================================

# --- DataSource ---
spring.datasource.url=jdbc:mysql://localhost:3306/emp_mgmt_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP connection pool (Spring Boot default)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000

# --- JPA / Hibernate ---
# 'update'  : Hibernate auto-updates schema on startup (safe for dev)
# 'validate': Only validates — use in staging/prod
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- JSP View Resolver ---
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# --- Server ---
server.port=8080

# --- Logging ---
logging.level.com.example.empmanagement=DEBUG
logging.level.org.hibernate.SQL=DEBUG
